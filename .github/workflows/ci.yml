name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  commit-message:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          chmod +x scripts/validate-commit.sh
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # For PRs, validate all commits in the PR
            git log --format=%s origin/${{ github.base_ref }}..HEAD | while read -r msg; do
              echo "$msg" > /tmp/commit_msg
              ./scripts/validate-commit.sh /tmp/commit_msg
            done
          else
            # For pushes, validate commits since last push
            git log --format=%s HEAD^..HEAD | while read -r msg; do
              echo "$msg" > /tmp/commit_msg
              ./scripts/validate-commit.sh /tmp/commit_msg
            done
          fi

  build:
    runs-on: ubuntu-latest
    needs: [commit-message]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: make build

      - name: Run tests
        run: make test-coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    needs: [commit-message]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          only-new-issues: true

      - name: Run linter
        run: make lint
